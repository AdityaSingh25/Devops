<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beautiful Profile Card</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: linear-gradient(45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
        background-size: 400% 400%;
        animation: gradient 15s ease infinite;
      }

      @keyframes gradient {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      .card {
        position: relative;
        width: 320px;
        padding: 40px;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 20px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        text-align: center;
        color: #fff;
        transition: transform 0.3s ease;
      }

      .card:hover {
        transform: translateY(-10px);
      }

      .profile-img {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        margin-bottom: 20px;
        border: 4px solid rgba(255, 255, 255, 0.5);
        object-fit: cover;
        background: #fff;
        display: inline-block;
      }

      h2 {
        font-size: 1.5rem;
        margin-bottom: 5px;
        letter-spacing: 1px;
      }

      p {
        font-size: 0.9rem;
        opacity: 0.8;
        margin-bottom: 20px;
      }

      .btn {
        padding: 10px 25px;
        background: #fff;
        color: #e73c7e;
        text-decoration: none;
        border-radius: 25px;
        font-weight: bold;
        font-size: 0.8rem;
        text-transform: uppercase;
        transition: 0.3s;
        display: inline-block;
      }

      .btn:hover {
        background: #e73c7e;
        color: #fff;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <!-- Placeholder for profile image -->
      <div
        class="profile-img"
        style="
          background: url(&quot;https://api.dicebear.com/7.x/avataaars/svg?seed=Felix&quot;)
            center/cover;
        "
      ></div>
      <h2>Aditya Singh!!!!</h2>
      <p>Cloud Engineer & Architect</p>
      <a href="#" class="btn">Connect</a>
    </div>
  </body>
</html>
