# This is a basic workflow to help you get started with Actions
# to run
name: Final DockerFilePush

# Controls when the workflow will run
on:
  workflow_run:
    workflows: ["Final Terraform + AWS cli workflow"]
    types:
      - completed

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      # Runs a single command using the runners shell
      - name: Run a one-line script
        run: echo Hello, world!

      # Runs a set of commands using the runners shell
      - name: Run a multi-line script
        run: |
          echo Add other actions to build,
          echo test, and deploy your project.

      - name: Login to Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push the image
        working-directory: javadockerbluegreen
        run: |

          docker build -t ${{ secrets.DOCKER_USERNAME }}/javakube-backend:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/javakube-backend:latest


          docker build --build-arg COLOR=blue -t ${{ secrets.DOCKER_USERNAME }}/javakube-frontend:blue -f Dockerfile.frontend .
          docker push ${{ secrets.DOCKER_USERNAME }}/javakube-frontend:blue


          docker build --build-arg COLOR=green -t ${{ secrets.DOCKER_USERNAME }}/javakube-frontend:green -f Dockerfile.frontend .
          docker push ${{ secrets.DOCKER_USERNAME }}/javakube-frontend:green
