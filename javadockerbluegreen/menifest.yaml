apiVersion: v1
kind: Namespace
metadata:
  name: aditya-bg-demo

---
# --- BACKEND ---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: aditya-bg-demo
  name: java-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: java-backend
          image: adinarayan25/javakube-backend:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "128Mi"
              cpu: "10m"

---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: aditya-bg-demo
spec:
  type: LoadBalancer
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080

---
# --- BLUE DEPLOYMENT ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-blue
  namespace: aditya-bg-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
      version: blue
  template:
    metadata:
      labels:
        app: frontend
        version: blue
    spec:
      containers:
        - name: frontend
          image: adinarayan25/javakube-frontend:blue
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "10m"

---
# --- GREEN DEPLOYMENT ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-green
  namespace: aditya-bg-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
      version: green
  template:
    metadata:
      labels:
        app: frontend
        version: green
    spec:
      containers:
        - name: frontend
          image: adinarayan25/javakube-frontend:green
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "10m"

---
# --- THE FRONTEND SERVICE (The Switcher) ---
# Change 'version: blue' to 'version: green' below to switch traffic!
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: aditya-bg-demo
spec:
  type: LoadBalancer
  selector:
    app: frontend
    version: blue # <--- TOGGLE THIS BETWEEN blue AND green
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
